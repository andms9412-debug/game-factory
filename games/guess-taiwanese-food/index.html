off.width=SRC;off.height=SRC;
const octx=off.getContext('2d');

function drawPixelArt(food){
  octx.clearRect(0,0,SRC,SRC);
  const c=food.colors,S=SRC,cat=food.cat;

  if(cat==='bowl'){
    // Bowl body - wide elliptical shape bottom 60%
    for(let y=0;y<S;y++)for(let x=0;x<S;x++){
      const cx=S/2,cy=S*0.62,rx=S*0.42,ry=S*0.28;
      if(((x-cx)/rx)**2+((y-cy)/ry)**2<=1&&y>S*0.34){octx.fillStyle=c[0];octx.fillRect(x,y,1,1)}
    }
    // Bowl rim - arc at top
    for(let y=~~(S*0.32);y<~~(S*0.38);y++)for(let x=~~(S*0.1);x<~~(S*0.9);x++){
      const cx=S/2,rx=S*0.40,ry=S*0.04;
      if(((x-cx)/rx)**2+((y-S*0.35)/ry)**2<=1){octx.fillStyle=c[0];octx.fillRect(x,y,1,1)}
    }
    // Contents surface
    for(let y=~~(S*0.36);y<~~(S*0.52);y++)for(let x=~~(S*0.16);x<~~(S*0.84);x++){
      const r=S*0.34-((y-S*0.36)/(S*0.16))*S*0.10;
      if(Math.abs(x-S/2)<r){octx.fillStyle=c[1];octx.fillRect(x,y,1,1)}
    }
    // Toppings scattered on top
    for(let y=~~(S*0.38);y<~~(S*0.50);y++)for(let x=~~(S*0.22);x<~~(S*0.78);x++){
      if(Math.random()>0.45){octx.fillStyle=c[2];octx.fillRect(x,y,1,1)}
    }
  } else if(cat==='noodle_bowl'){
    // Same bowl shape
    for(let y=0;y<S;y++)for(let x=0;x<S;x++){
      const cx=S/2,cy=S*0.62,rx=S*0.42,ry=S*0.28;
      if(((x-cx)/rx)**2+((y-cy)/ry)**2<=1&&y>S*0.34){octx.fillStyle=c[0];octx.fillRect(x,y,1,1)}
    }
    // Bowl rim
    for(let y=~~(S*0.32);y<~~(S*0.38);y++)for(let x=~~(S*0.1);x<~~(S*0.9);x++){
      const cx=S/2,rx=S*0.40,ry=S*0.04;
      if(((x-cx)/rx)**2+((y-S*0.35)/ry)**2<=1){octx.fillStyle=c[0];octx.fillRect(x,y,1,1)}
    }
    // Broth surface
    for(let y=~~(S*0.36);y<~~(S*0.55);y++)for(let x=~~(S*0.16);x<~~(S*0.84);x++){
      const r=S*0.34-((y-S*0.36)/(S*0.19))*S*0.10;
      if(Math.abs(x-S/2)<r){octx.fillStyle=c[0];octx.fillRect(x,y,1,1)}
    }
    // Wavy noodle lines
    octx.strokeStyle=c[1];octx.lineWidth=3;
    for(let n=0;n<4;n++){
      octx.beginPath();
      const baseY=S*0.40+n*S*0.035;
      for(let x=~~(S*0.22);x<~~(S*0.78);x++){
        const y=baseY+Math.sin((x+n*20)*0.08)*S*0.02;
        if(x===~~(S*0.22))octx.moveTo(x,y);else octx.lineTo(x,y);
      }
      octx.stroke();
    }
    // Topping chunks
    octx.fillStyle=c[2];
    for(let i=0;i<3;i++){
      const tx=S*0.30+i*S*0.15,ty=S*0.40+i*S*0.02;
      octx.fillRect(tx,ty,S*0.08,S*0.05);
    }
  } else if(cat==='box'){
    // 3D rectangular container
    const bx=S*0.12,by=S*0.25,bw=S*0.76,bh=S*0.55;
    // Front face
    octx.fillStyle=c[0];
    octx.fillRect(bx,by+S*0.08,bw,bh);
    // Top face (parallelogram for 3D)
    octx.fillStyle=c[0];
    octx.beginPath();
    octx.moveTo(bx,by+S*0.08);
    octx.lineTo(bx+S*0.08,by);
    octx.lineTo(bx+bw+S*0.08,by);
    octx.lineTo(bx+bw,by+S*0.08);
    octx.closePath();
    octx.fill();
    // Rice/base filling
    octx.fillStyle=c[1];
    octx.fillRect(bx+S*0.04,by+S*0.12,bw-S*0.08,bh-S*0.08);
    // Main dish item on top-right
    octx.fillStyle=c[2];
    const dx=bx+bw*0.45,dy=by+S*0.14,dw=bw*0.45,dh=bh*0.40;
    octx.fillRect(dx,dy,dw,dh);
    // Side items
    octx.fillStyle=c[2];
    octx.globalAlpha=0.6;
    octx.fillRect(bx+S*0.06,by+S*0.14,bw*0.25,bh*0.20);
    octx.globalAlpha=1.0;
    // Container rim highlight
    octx.strokeStyle=c[0];octx.lineWidth=3;
    octx.strokeRect(bx,by+S*0.08,bw,bh);
  } else if(cat==='slab'){
    // Thick vertical rectangle with 3D perspective
    const sx=S*0.22,sy=S*0.18,sw=S*0.50,sh=S*0.62;
    // Front face
    octx.fillStyle=c[0];
    octx.fillRect(sx,sy+S*0.06,sw,sh);
    // Top face (parallelogram)
    octx.fillStyle=c[1];
    octx.beginPath();
    octx.moveTo(sx,sy+S*0.06);
    octx.lineTo(sx+S*0.10,sy);
    octx.lineTo(sx+sw+S*0.10,sy);
    octx.lineTo(sx+sw,sy+S*0.06);
    octx.closePath();
    octx.fill();
    // Right side face
    octx.fillStyle=c[0];
    octx.globalAlpha=0.7;
    octx.beginPath();
    octx.moveTo(sx+sw,sy+S*0.06);
    octx.lineTo(sx+sw+S*0.10,sy);
    octx.lineTo(sx+sw+S*0.10,sy+sh);
    octx.lineTo(sx+sw,sy+S*0.06+sh);
    octx.closePath();
    octx.fill();
    octx.globalAlpha=1.0;
    // Inner texture/detail spots
    octx.fillStyle=c[2];
    for(let i=0;i<8;i++){
      const px=sx+S*0.06+Math.random()*sw*0.7;
      const py=sy+S*0.12+Math.random()*sh*0.7;
      octx.fillRect(px,py,S*0.04,S*0.03);
    }
  } else if(cat==='layer'){
    // Circular/oval pastry with horizontal layers
    const cx=S/2,cy=S/2,rx=S*0.36,ry=S*0.30;
    for(let y=0;y<S;y++)for(let x=0;x<S;x++){
      if(((x-cx)/rx)**2+((y-cy)/ry)**2<=1){
        const layerIdx=~~((y-cy+ry)/(ry*2)*5);
        if(layerIdx%2===0) octx.fillStyle=c[0];
        else octx.fillStyle=c[1];
        octx.fillRect(x,y,1,1);
      }
    }
    // Layer line separations
    octx.strokeStyle=c[1];octx.lineWidth=2;
    for(let i=1;i<5;i++){
      const ly=cy-ry+i*(ry*2/5);
      const halfW=rx*Math.sqrt(1-((ly-cy)/ry)**2);
      if(halfW>0){
        octx.beginPath();
        octx.moveTo(cx-halfW,ly);
        octx.lineTo(cx+halfW,ly);
        octx.stroke();
      }
    }
    // Filling glimpse between layers
    octx.fillStyle=c[2];
    for(let i=1;i<5;i+=2){
      const ly=cy-ry+i*(ry*2/5)+2;
      const halfW=rx*Math.sqrt(Math.max(0,1-((ly-cy)/ry)**2))*0.6;
      if(halfW>0){
        octx.globalAlpha=0.5;
        octx.fillRect(cx-halfW,ly,halfW*2,S*0.015);
        octx.globalAlpha=1.0;
      }
    }
  } else if(cat==='round'){
    const cx=S/2,cy=S/2,r=S*0.36;
    for(let y=0;y<S;y++)for(let x=0;x<S;x++){
      const d=Math.hypot(x-cx,y-cy);
      if(d<=r){
        if(d<r*0.50) octx.fillStyle=c[1];
        else if(d<r*0.80) octx.fillStyle=c[0];
        else octx.fillStyle=c[2];
        octx.fillRect(x,y,1,1);
      }
    }
  } else if(cat==='bao'){
    // Dome shape - top 2/3 semicircle, bottom flat
    const cx=S/2,botY=S*0.72,r=S*0.34;
    // Dome body
    for(let y=0;y<S;y++)for(let x=0;x<S;x++){
      const d=Math.hypot(x-cx,y-botY);
      if(d<=r&&y<=botY){octx.fillStyle=c[0];octx.fillRect(x,y,1,1)}
    }
    // Flat bottom rectangle
    octx.fillStyle=c[0];
    octx.fillRect(cx-r,botY-2,r*2,S*0.06);
    // Pleat lines radiating from top center
    octx.strokeStyle=c[1];octx.lineWidth=2;
    for(let i=0;i<5;i++){
      const angle=-Math.PI*0.15+i*Math.PI*0.075;
      octx.beginPath();
      octx.moveTo(cx,botY-r+S*0.04);
      octx.lineTo(cx+Math.sin(angle)*r*0.7,botY-r+S*0.04+Math.cos(angle)*r*0.65);
      octx.stroke();
    }
    // Filling visible at bottom
    octx.fillStyle=c[2];
    octx.fillRect(cx-r*0.5,botY,r,S*0.04);
  } else if(cat==='wrap'){
    // Horizontal cylinder shape (burrito-like)
    const cx=S/2,cy=S/2,rx=S*0.40,ry=S*0.18;
    // Main body
    for(let y=0;y<S;y++)for(let x=0;x<S;x++){
      if(((x-cx)/rx)**2+((y-cy)/ry)**2<=1){
        octx.fillStyle=c[0];octx.fillRect(x,y,1,1);
      }
    }
    // Tapered ends shading
    for(let y=~~(cy-ry*0.6);y<~~(cy+ry*0.6);y++)for(let x=~~(cx-rx);x<~~(cx-rx+S*0.08);x++){
      if(((x-cx)/rx)**2+((y-cy)/ry)**2<=1){
        octx.fillStyle=c[0];octx.globalAlpha=0.7;octx.fillRect(x,y,1,1);octx.globalAlpha=1;
      }
    }
    // Cross-section / filling visible at right end
    const endCx=cx+rx*0.85,endRy=ry*0.55;
    for(let y=0;y<S;y++)for(let x=0;x<S;x++){
      const d=Math.hypot((x-endCx)*1.5,y-cy);
      if(d<endRy){
        octx.fillStyle=d<endRy*0.5?c[2]:c[1];octx.fillRect(x,y,1,1);
      }
    }
    // Wrapper edge highlight
    octx.strokeStyle=c[0];octx.lineWidth=2;
    octx.beginPath();octx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);octx.stroke();
  } else if(cat==='flat'){
    // Wide flat ellipse, very low aspect ratio
    const cx=S/2,cy=S*0.52;
    for(let y=0;y<S;y++)for(let x=0;x<S;x++){
      if(((x-cx)/(S*0.42))**2+((y-cy)/(S*0.12))**2<=1){
        octx.fillStyle=y<cy?c[0]:c[1];octx.fillRect(x,y,1,1);
      }
    }
    // Surface texture spots
    octx.fillStyle=c[2];
    for(let i=0;i<20;i++){
      const px=cx-S*0.30+Math.random()*S*0.60;
      const py=cy-S*0.06+Math.random()*S*0.08;
      if(((px-cx)/(S*0.38))**2+((py-cy)/(S*0.10))**2<=1){
        octx.fillRect(px,py,S*0.02,S*0.015);
      }
    }
    // Thickness edge
    octx.fillStyle=c[1];
    for(let x=~~(cx-S*0.40);x<~~(cx+S*0.40);x++){
      const ey=cy+S*0.12*Math.sqrt(Math.max(0,1-((x-cx)/(S*0.42))**2));
      octx.fillRect(x,ey,1,S*0.03);
    }
  } else if(cat==='dumpling'){
    // Crescent / half-moon shape, horizontal
    const cx=S/2,cy=S*0.52,rx=S*0.38,ry=S*0.22;
    // Main body - top half of ellipse
    for(let y=0;y<S;y++)for(let x=0;x<S;x++){
      if(((x-cx)/rx)**2+((y-cy)/ry)**2<=1&&y<=cy+ry*0.3){
        octx.fillStyle=c[0];octx.fillRect(x,y,1,1);
      }
    }
    // Bottom flat edge
    octx.fillStyle=c[2];
    for(let x=~~(cx-rx*0.9);x<~~(cx+rx*0.9);x++){
      octx.fillRect(x,~~(cy+ry*0.2),1,S*0.04);
    }
    // Crimped edge along top arc (zigzag)
    octx.strokeStyle=c[1];octx.lineWidth=3;
    octx.beginPath();
    for(let i=0;i<=20;i++){
      const t=-Math.PI*(0.1)+i*Math.PI*0.04;
      const bx=cx+Math.cos(t)*rx*0.95;
      const by=cy+Math.sin(t)*ry*0.85+(i%2===0?-S*0.02:S*0.02);
      if(i===0)octx.moveTo(bx,by);else octx.lineTo(bx,by);
    }
    octx.stroke();
    // Pleat marks
    octx.fillStyle=c[1];
    for(let i=0;i<8;i++){
      const t=-Math.PI*0.8+i*Math.PI*0.1;
      const px=cx+Math.cos(t)*rx*0.7;
      const py=cy+Math.sin(t)*ry*0.5;
      octx.fillRect(px-1,py-S*0.02,2,S*0.04);
    }
  } else if(cat==='stick'){
    // Tall vertical rectangle with rounded top
    const sx=~~(S*0.32),sw=~~(S*0.36),sy=~~(S*0.10),sh=~~(S*0.58);
    // Rounded top
    const topCx=sx+sw/2,topCy=sy+sw/2,topR=sw/2;
    for(let y=sy;y<sy+sw/2;y++)for(let x=sx;x<sx+sw;x++){
      if(Math.hypot(x-topCx,y-topCy)<=topR){octx.fillStyle=c[0];octx.fillRect(x,y,1,1)}
    }
    // Main body
    octx.fillStyle=c[0];
    octx.fillRect(sx,sy+sw/2,sw,sh-sw/2);
    // Coating/detail on body
    octx.fillStyle=c[1];
    octx.fillRect(sx+S*0.04,sy+S*0.08,sw-S*0.08,sh*0.45);
    // Skewer line extending below
    octx.fillStyle=c[2];
    octx.fillRect(~~(S*0.47),sy+sh,~~(S*0.06),~~(S*0.22));
    // Skewer point
    octx.beginPath();
    octx.moveTo(S*0.47,sy+sh+S*0.22);
    octx.lineTo(S*0.53,sy+sh+S*0.22);
    octx.lineTo(S*0.50,sy+sh+S*0.28);
    octx.closePath();
    octx.fillStyle=c[2];octx.fill();
  } else if(cat==='skewer'){
    // 3-4 round pieces threaded on a diagonal stick
    // Diagonal stick
    octx.strokeStyle=c[2];octx.lineWidth=4;
    octx.beginPath();
    octx.moveTo(S*0.18,S*0.78);
    octx.lineTo(S*0.82,S*0.18);
    octx.stroke();
    // Pieces along the stick
    const pieces=[
      {x:S*0.30,y:S*0.66,r:S*0.09},
      {x:S*0.42,y:S*0.54,r:S*0.10},
      {x:S*0.55,y:S*0.41,r:S*0.09},
      {x:S*0.67,y:S*0.29,r:S*0.08}
    ];
    for(let pi=0;pi<pieces.length;pi++){
      const p=pieces[pi];
      const col=pi%2===0?c[0]:c[1];
      for(let y=0;y<S;y++)for(let x=0;x<S;x++){
        if(Math.hypot(x-p.x,y-p.y)<=p.r){octx.fillStyle=col;octx.fillRect(x,y,1,1)}
      }
      // Highlight
      octx.fillStyle='rgba(255,255,255,0.15)';
      for(let y=0;y<S;y++)for(let x=0;x<S;x++){
        if(Math.hypot(x-p.x+p.r*0.2,y-p.y+p.r*0.2)<=p.r*0.4){octx.fillRect(x,y,1,1)}
      }
    }
  } else if(cat==='square'){
    // Rounded-corner rectangle
    const m=~~(S*0.18),w=S-m*2,r=S*0.06;
    // Outer body with rounded corners
    octx.fillStyle=c[0];
    octx.beginPath();
    octx.moveTo(m+r,m);octx.lineTo(m+w-r,m);octx.quadraticCurveTo(m+w,m,m+w,m+r);
    octx.lineTo(m+w,m+w-r);octx.quadraticCurveTo(m+w,m+w,m+w-r,m+w);
    octx.lineTo(m+r,m+w);octx.quadraticCurveTo(m,m+w,m,m+w-r);
    octx.lineTo(m,m+r);octx.quadraticCurveTo(m,m,m+r,m);
    octx.closePath();octx.fill();
    // Inner surface
    const im=m+S*0.06,iw=w-S*0.12;
    octx.fillStyle=c[1];
    octx.fillRect(im,im,iw,iw);
    // Accent detail blocks
    octx.fillStyle=c[2];
    const bs=S*0.06;
    for(let i=0;i<3;i++)for(let j=0;j<3;j++){
      if((i+j)%2===0){
        octx.fillRect(im+S*0.03+i*(iw/3),im+S*0.03+j*(iw/3),bs,bs);
      }
    }
  } else if(cat==='cup'){
    // Tapered trapezoid (wider at top), dome lid
    const topW=S*0.36,botW=S*0.24,topY=S*0.18,botY=S*0.82;
    // Cup body
    for(let y=~~topY;y<~~botY;y++){
      const t=(y-topY)/(botY-topY);
      const hw=topW-(topW-botW)*t;
      const lx=~~(S/2-hw),rx=~~(S/2+hw);
      for(let x=lx;x<rx;x++){
        octx.fillStyle=t<0.65?c[0]:c[1];
        octx.fillRect(x,y,1,1);
      }
    }
    // Dome lid
    octx.fillStyle=c[2];
    for(let y=~~(S*0.10);y<~~(S*0.20);y++)for(let x=0;x<S;x++){
      const cx=S/2,rx=topW+S*0.02,ry=S*0.06;
      if(((x-cx)/rx)**2+((y-S*0.18)/ry)**2<=1){
        octx.fillRect(x,y,1,1);
      }
    }
    // Rim
    octx.fillStyle=c[2];
    octx.fillRect(~~(S/2-topW-S*0.02),~~(S*0.17),~~((topW+S*0.02)*2),~~(S*0.03));
    // Liquid level line
    octx.strokeStyle='rgba(255,255,255,0.3)';octx.lineWidth=2;
    octx.beginPath();
    const llY=S*0.35;
    const llHw=topW-(topW-botW)*((llY-topY)/(botY-topY));
    octx.moveTo(S/2-llHw+S*0.02,llY);
    octx.lineTo(S/2+llHw-S*0.02,llY);
    octx.stroke();
  } else if(cat==='pile'){
    // Irregular cluster of 12-15 small pieces heaped up
    for(let i=0;i<15;i++){
      const px=~~(S*0.18+Math.random()*S*0.64);
      const py=~~(S*0.25+Math.random()*S*0.50);
      const pr=~~(S*0.06+Math.random()*S*0.05);
      const isAngular=Math.random()>0.5;
      const col=i%3===0?c[2]:i%2===0?c[1]:c[0];
      octx.fillStyle=col;
      if(isAngular){
        // Angular piece
        octx.fillRect(px-pr,py-pr*0.7,pr*2,pr*1.4);
      } else {
        // Round piece
        for(let y=py-pr;y<py+pr;y++)for(let x=px-pr;x<px+pr;x++){
          if((x-px)**2+(y-py)**2<pr*pr&&x>=0&&x<S&&y>=0&&y<S)octx.fillRect(x,y,1,1);
        }
      }
      // Highlight
      octx.fillStyle='rgba(255,255,255,0.1)';
      octx.fillRect(px-pr*0.3,py-pr*0.5,pr*0.5,pr*0.4);
    }
  }

  // Apply decorations
  if(food.deco) food.deco.forEach(d => drawDeco(food, d));
}

function drawDeco(food, decoType){
  const S=SRC,c=food.colors;

  if(decoType==='steam'){
    // 3 wavy semi-transparent white lines rising from top
    octx.strokeStyle='rgba(255,255,255,0.4)';
    octx.lineWidth=4;
    for(let i=0;i<3;i++){
      octx.beginPath();
      const baseX=S*0.32+i*S*0.18;
      for(let dy=0;dy<~~(S*0.22);dy++){
        const x=baseX+Math.sin(dy*0.12+i*2)*S*0.04;
        const y=S*0.12-dy*0.6;
        if(dy===0)octx.moveTo(x,y+S*0.10);else octx.lineTo(x,y+S*0.10);
      }
      octx.stroke();
    }
  } else if(decoType==='sauce'){
    // 2-3 horizontal wavy dark brown drizzle lines
    octx.strokeStyle='#5C3317';octx.lineWidth=3;
    for(let i=0;i<3;i++){
      octx.beginPath();
      const baseY=S*0.36+i*S*0.05;
      for(let x=~~(S*0.25);x<~~(S*0.75);x++){
        const y=baseY+Math.sin(x*0.1+i*3)*S*0.015;
        if(x===~~(S*0.25))octx.moveTo(x,y);else octx.lineTo(x,y);
      }
      octx.stroke();
    }
  } else if(decoType==='sauce_red'){
    // Same as sauce but orange-red
    octx.strokeStyle='#FF4500';octx.lineWidth=3;
    for(let i=0;i<3;i++){
      octx.beginPath();
      const baseY=S*0.36+i*S*0.05;
      for(let x=~~(S*0.25);x<~~(S*0.75);x++){
        const y=baseY+Math.sin(x*0.1+i*3)*S*0.015;
        if(x===~~(S*0.25))octx.moveTo(x,y);else octx.lineTo(x,y);
      }
      octx.stroke();
    }
  } else if(decoType==='powder'){
    // ~30 scattered tan dots
    octx.fillStyle='#DEB887';
    for(let i=0;i<30;i++){
      const px=S*0.20+Math.random()*S*0.60;
      const py=S*0.25+Math.random()*S*0.45;
      const sz=2+Math.random()*2;
      octx.fillRect(px,py,sz,sz);
    }
  } else if(decoType==='sesame'){
    // ~12 small white dots scattered on top
    octx.fillStyle='#FFF';
    for(let i=0;i<12;i++){
      const px=S*0.28+Math.random()*S*0.44;
      const py=S*0.28+Math.random()*S*0.30;
      octx.fillRect(px,py,2,2);
    }
  } else if(decoType==='green_flecks'){
    // ~15 small green dots scattered
    octx.fillStyle='#228B22';
    for(let i=0;i<15;i++){
      const px=S*0.22+Math.random()*S*0.56;
      const py=S*0.32+Math.random()*S*0.25;
      octx.fillRect(px,py,3,2);
    }
  } else if(decoType==='herb'){
    // 2-3 small leaf shapes (pointed ovals)
    octx.fillStyle='#228B22';
    for(let i=0;i<3;i++){
      const lx=S*0.30+i*S*0.16,ly=S*0.34+i*S*0.04;
      octx.beginPath();
      octx.ellipse(lx,ly,S*0.05,S*0.02,i*0.5-0.3,0,Math.PI*2);
      octx.fill();
      // Leaf vein
      octx.strokeStyle='#1A6B1A';octx.lineWidth=1;
      octx.beginPath();
      octx.moveTo(lx-S*0.04,ly);octx.lineTo(lx+S*0.04,ly);
      octx.stroke();
    }
  } else if(decoType==='crispy_bottom'){
    // Bottom 15-18% filled darker golden-brown
    octx.fillStyle='#B8860B';
    octx.fillRect(S*0.10,S*0.82,S*0.80,S*0.12);
    // Hard edge line
    octx.strokeStyle='#8B6508';octx.lineWidth=2;
    octx.beginPath();
    octx.moveTo(S*0.10,S*0.82);octx.lineTo(S*0.90,S*0.82);
    octx.stroke();
  } else if(decoType==='straw'){
    // Diagonal line from upper area extending up-right, striped green/white
    const sx=S*0.52,sy=S*0.18,ex=S*0.72,ey=S*0.02;
    octx.lineWidth=4;
    const steps=12;
    for(let i=0;i<steps;i++){
      const t1=i/steps,t2=(i+1)/steps;
      octx.strokeStyle=i%2===0?'#228B22':'#FFF';
      octx.beginPath();
      octx.moveTo(sx+(ex-sx)*t1,sy+(ey-sy)*t1);
      octx.lineTo(sx+(ex-sx)*t2,sy+(ey-sy)*t2);
      octx.stroke();
    }
    // Bend at top
    octx.strokeStyle='#228B22';octx.lineWidth=4;
    octx.beginPath();
    octx.moveTo(ex,ey);octx.lineTo(ex+S*0.04,ey-S*0.03);
    octx.stroke();
  } else if(decoType==='bubbles'){
    // 5-8 small semi-transparent white circles
    octx.fillStyle='rgba(255,255,255,0.35)';
    for(let i=0;i<7;i++){
      const bx=S*0.30+Math.random()*S*0.40;
      const by=S*0.22+Math.random()*S*0.20;
      const br=S*0.015+Math.random()*S*0.015;
      octx.beginPath();
      octx.arc(bx,by,br,0,Math.PI*2);
      octx.fill();
    }
  } else if(decoType==='chopsticks'){
    // Two thin diagonal lines crossing
    octx.strokeStyle='#D2B48C';octx.lineWidth=3;
    octx.beginPath();
    octx.moveTo(S*0.15,S*0.80);octx.lineTo(S*0.60,S*0.25);
    octx.stroke();
    octx.beginPath();
    octx.moveTo(S*0.22,S*0.82);octx.lineTo(S*0.65,S*0.28);
    octx.stroke();
  } else if(decoType==='lid_open'){
    // A tilted rectangle sitting at angle on top
    octx.save();
    octx.translate(S*0.62,S*0.12);
    octx.rotate(-0.4);
    octx.fillStyle=c[0];
    octx.fillRect(-S*0.18,-S*0.03,S*0.36,S*0.06);
    octx.strokeStyle='#8B6508';octx.lineWidth=2;
    octx.strokeRect(-S*0.18,-S*0.03,S*0.36,S*0.06);
    octx.restore();
  } else if(decoType==='leaf'){
    // Single green leaf shape beside the food
    octx.fillStyle='#228B22';
    octx.beginPath();
    octx.ellipse(S*0.82,S*0.60,S*0.08,S*0.03,0.6,0,Math.PI*2);
    octx.fill();
    // Leaf vein
    octx.strokeStyle='#1A6B1A';octx.lineWidth=1;
    octx.beginPath();
    const lcos=Math.cos(0.6)*S*0.07,lsin=Math.sin(0.6)*S*0.07;
    octx.moveTo(S*0.82-lcos,S*0.60-lsin);
    octx.lineTo(S*0.82+lcos,S*0.60+lsin);
    octx.stroke();
  } else if(decoType==='corn_rows'){
    // Horizontal rows of small yellow dots across body
    octx.fillStyle='#FFD700';
    for(let row=0;row<10;row++){
      const ry=S*0.18+row*S*0.055;
      for(let col=0;col<8;col++){
        const rx=S*0.36+col*S*0.035+(row%2)*S*0.017;
        octx.fillRect(rx,ry,3,3);
      }
    }
  } else if(decoType==='egg_shapes'){
    // 3-5 small oval outlines arranged in pattern
    octx.strokeStyle='#DAA520';octx.lineWidth=2;
    const positions=[
      {x:S*0.35,y:S*0.35},{x:S*0.55,y:S*0.32},{x:S*0.68,y:S*0.40},
      {x:S*0.40,y:S*0.55},{x:S*0.60,y:S*0.55}
    ];
    for(const p of positions){
      octx.beginPath();
      octx.ellipse(p.x,p.y,S*0.06,S*0.045,0.2,0,Math.PI*2);
      octx.stroke();
    }
  } else if(decoType==='drizzle_soy'){
    // 2-3 thin dark drizzle lines across top
    octx.strokeStyle='#3C1414';octx.lineWidth=2;
    for(let i=0;i<3;i++){
      octx.beginPath();
      const baseY=S*0.38+i*S*0.04;
      for(let x=~~(S*0.25);x<~~(S*0.75);x++){
        const y=baseY+Math.sin(x*0.08+i*4)*S*0.01;
        if(x===~~(S*0.25))octx.moveTo(x,y);else octx.lineTo(x,y);
      }
      octx.stroke();
    }
  }
}

function renderPixelated(level){
  const ps=[24,12,6,3,1][Math.min(level,4)];
  cvs.width=window.innerWidth;cvs.height=window.innerHeight;
  ctx.imageSmoothingEnabled=false;ctx.clearRect(0,0,cvs.width,cvs.height);
  const dispSize=Math.min(cvs.width,cvs.height)*0.6;
  const ox=(cvs.width-dispSize)/2,oy=(cvs.height-dispSize)/2;
  const src=octx.getImageData(0,0,SRC,SRC);
  const bsize=dispSize/(SRC/ps);
  for(let by=0;by<SRC;by+=ps)for(let bx=0;bx<SRC;bx+=ps){
    let r=0,g=0,b=0,a=0,cnt=0;
    for(let dy=0;dy<ps&&by+dy<SRC;dy++)for(let dx=0;dx<ps&&bx+dx<SRC;dx++){
      const i=((by+dy)*SRC+(bx+dx))*4;
      if(src.data[i+3]>0){r+=src.data[i];g+=src.data[i+1];b+=src.data[i+2];a+=src.data[i+3];cnt++}
    }
    if(cnt>0){
      ctx.fillStyle=`rgba(${~~(r/cnt)},${~~(g/cnt)},${~~(b/cnt)},${(a/cnt)/255})`;
      ctx.fillRect(ox+bx/ps*bsize,oy+by/ps*bsize,Math.ceil(bsize),Math.ceil(bsize));
    }
  }
}

function init(){
  currentFood=FOODS[~~(Math.random()*FOODS.length)];
  answer=currentFood.name;answerLen=[...answer].length;
  row=0;over=false;guesses=[];
  document.getElementById('hint').textContent='\u{1F4A1} 提示：'+currentFood.hints[0];
  document.getElementById('char-count').textContent='答案有 '+answerLen+' 個字';
  document.getElementById('chances-num').textContent=MAX;
  document.getElementById('history').innerHTML='';
  document.getElementById('message').textContent='';
  document.getElementById('end-screen').style.display='none';
  document.getElementById('input-area').style.display='flex';
  document.getElementById('current-row').style.display='flex';
  const inp=document.getElementById('text-input');
  inp.maxLength=answerLen;inp.placeholder='輸入'+answerLen+'個字';inp.value='';
  buildCurrent();
  drawPixelArt(currentFood);renderPixelated(0);
}

function buildCurrent(){
  const r=document.getElementById('current-row');r.innerHTML='';
  for(let i=0;i<answerLen;i++){const t=document.createElement('div');t.className='tile';t.id='t'+i;r.appendChild(t)}
}

function fillCurrent(s){
  const c=[...s];
  for(let i=0;i<answerLen;i++){const t=document.getElementById('t'+i);if(i<c.length){t.textContent=c[i];t.className='tile filled'}else{t.textContent='';t.className='tile'}}
}

function evaluate(g,a){
  const ga=[...g],aa=[...a],len=aa.length;
  const r=Array(len).fill('absent'),used=Array(len).fill(false);
  for(let i=0;i<len;i++)if(ga[i]===aa[i]){r[i]='correct';used[i]=true}
  for(let i=0;i<len;i++){if(r[i]==='correct')continue;for(let j=0;j<len;j++)if(!used[j]&&ga[i]===aa[j]){r[i]='present';used[j]=true;break}}
  return r;
}

function addHistory(g,res){
  const h=document.getElementById('history'),d=document.createElement('div');d.className='hist-row';
  const chars=[...g];
  for(let i=0;i<chars.length;i++){const t=document.createElement('div');t.className='hist-tile '+res[i];t.textContent=chars[i];d.appendChild(t)}
  h.appendChild(d);
}

function showMsg(t,ms){
  const m=document.getElementById('message');m.textContent=t;
  if(ms>0)setTimeout(()=>{if(m.textContent===t)m.textContent=''},ms);
}

function submit(){
  if(over)return;
  const inp=document.getElementById('text-input'),g=inp.value.trim();
  if([...g].length!==answerLen){showMsg('請輸入 '+answerLen+' 個字！',2000);return}
  const res=evaluate(g,answer);
  guesses.push(g);addHistory(g,res);row++;
  const won=g===answer;
  document.getElementById('chances-num').textContent=MAX-row;
  if(!won&&row<MAX){
    document.getElementById('hint').textContent='\u{1F4A1} 提示：'+currentFood.hints[Math.min(row,3)];
    renderPixelated(row);
  }
  buildCurrent();inp.value='';
  if(won||row>=MAX){
    over=true;
    document.getElementById('input-area').style.display='none';
    document.getElementById('current-row').style.display='none';
    renderPixelated(4);
    const et=document.getElementById('end-title'),ea=document.getElementById('end-answer');
    if(won){et.textContent=['天才！🎉','厲害！👏','不錯喔！😄','好險！😅'][row-1]||'答對了！';ea.textContent=''}
    else{et.textContent='沒猜到 😢';ea.textContent='答案是：'+answer}
    document.getElementById('end-screen').style.display='block';
  }else{inp.focus()}
}

function shareResult(){
  const em={correct:'🟩',present:'🟨',absent:'⬛'};
  let t='🍜 猜台灣小吃\n';
  const won=guesses.length>0&&guesses[guesses.length-1]===answer;
  t+=(won?row:'X')+'/'+MAX+'\n\n';
  for(const g of guesses)t+=evaluate(g,answer).map(r=>em[r]).join('')+'\n';
  if(navigator.clipboard)navigator.clipboard.writeText(t).then(()=>showMsg('已複製！📋',2000));
}

window.addEventListener('resize',()=>{if(currentFood)renderPixelated(Math.min(row,4))});
document.getElementById('tutorial-btn').onclick=()=>{document.getElementById('tutorial-overlay').style.display='none';document.getElementById('text-input').focus()};
document.getElementById('submit-btn').onclick=submit;
document.getElementById('text-input').addEventListener('input',()=>{if(!over)fillCurrent(document.getElementById('text-input').value.trim())});
document.getElementById('text-input').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();submit()}});
document.getElementById('share-btn').onclick=shareResult;
document.getElementById('replay-btn').onclick=init;
init();
</script>
