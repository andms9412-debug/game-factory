    const cx=S/2,cy=S/2,r=S*0.36;
    for(let y=0;y<S;y++)for(let x=0;x<S;x++){
      const d=Math.sqrt((x-cx)*(x-cx)+(y-cy)*(y-cy));
      if(d<=r){
        octx.fillStyle=d<r*0.5?c[1]:d<r*0.8?c[0]:c[2];
        octx.fillRect(x,y,1,1);
      }
    }
  }
  else if(cat==='square'){
    const m=Math.floor(S*0.18),w=S-m*2;
    octx.fillStyle=c[0];octx.fillRect(m,m,w,w);
    octx.fillStyle=c[1];octx.fillRect(m+3,m+3,w-6,w-6);
    octx.fillStyle=c[2];
    for(let i=0;i<4;i++)octx.fillRect(m+4+i*Math.floor(w/5),m+4,Math.floor(w/6),Math.floor(w/6));
  }
  else if(cat==='flat'){
    const cx=S/2,cy=S*0.52;
    for(let y=0;y<S;y++)for(let x=0;x<S;x++){
      const dx=(x-cx)/(S*0.42),dy=(y-cy)/(S*0.22);
      if(dx*dx+dy*dy<=1){
        octx.fillStyle=y<cy?c[1]:c[0];
        octx.fillRect(x,y,1,1);
      }
    }
    octx.fillStyle=c[2];
    for(let x=Math.floor(S*0.3);x<Math.floor(S*0.7);x++)
      for(let y=Math.floor(S*0.45);y<Math.floor(S*0.52);y++)
        if(Math.random()>0.3)octx.fillRect(x,y,1,1);
  }
  else if(cat==='stick'){
    const x1=Math.floor(S*0.34),x2=Math.floor(S*0.66),y1=Math.floor(S*0.12),y2=Math.floor(S*0.78);
    octx.fillStyle=c[0];octx.fillRect(x1,y1,x2-x1,y2-y1);
    octx.fillStyle=c[1];octx.fillRect(x1+2,y1+2,x2-x1-4,Math.floor((y2-y1)*0.5));
    octx.fillStyle=c[2];octx.fillRect(Math.floor(S*0.45),y2,Math.floor(S*0.1),Math.floor(S*0.14));
  }
  else if(cat==='roll'){
    for(let y=Math.floor(S*0.25);y<Math.floor(S*0.75);y++)
      for(let x=Math.floor(S*0.12);x<Math.floor(S*0.88);x++){
        octx.fillStyle=c[0];octx.fillRect(x,y,1,1);
      }
    for(let y=Math.floor(S*0.32);y<Math.floor(S*0.68);y++)
      for(let x=Math.floor(S*0.18);x<Math.floor(S*0.82);x++){
        octx.fillStyle=Math.random()>0.5?c[1]:c[2];
        octx.fillRect(x,y,1,1);
      }
  }
  else if(cat==='cup'){
    // Cup body
    for(let y=Math.floor(S*0.15);y<Math.floor(S*0.8);y++){
      const t=(y-S*0.15)/(S*0.65);
      const hw=S*0.18+t*S*0.12;
      for(let x=Math.floor(S/2-hw);x<Math.floor(S/2+hw);x++){
        octx.fillStyle=t<0.7?c[0]:c[1];
        octx.fillRect(x,y,1,1);
      }
    }
    // Lid
    octx.fillStyle=c[2];
    for(let x=Math.floor(S*0.28);x<Math.floor(S*0.72);x++)
      octx.fillRect(x,Math.floor(S*0.12),1,3);
    // Straw
    octx.fillStyle=c[2];
    octx.fillRect(Math.floor(S*0.55),Math.floor(S*0.02),2,Math.floor(S*0.15));
  }
  else if(cat==='pile'){
    // Pile of fried food
    for(let i=0;i<12;i++){
      const px=Math.floor(S*0.2+Math.random()*S*0.6);
      const py=Math.floor(S*0.3+Math.random()*S*0.45);
      const r=Math.floor(S*0.08+Math.random()*S*0.06);
      octx.fillStyle=i%3===0?c[2]:i%2===0?c[1]:c[0];
      for(let y=py-r;y<py+r;y++)for(let x=px-r;x<px+r;x++)
        if((x-px)*(x-px)+(y-py)*(y-py)<r*r&&x>=0&&x<S&&y>=0&&y<S)
          octx.fillRect(x,y,1,1);
    }
  }
}

// Render pixelated version to main canvas
function renderPixelated(level){
  // level 0-3: 0=most blurry, 3=clearest
  const pixelSizes=[8,5,3,1]; // how many source pixels per block
  const ps=pixelSizes[Math.min(level,3)];
  
  cvs.width=window.innerWidth;
  cvs.height=window.innerHeight;
  ctx.imageSmoothingEnabled=false;
  ctx.clearRect(0,0,cvs.width,cvs.height);
  
  // Calculate display size (centered, ~60% of viewport)
  const dispSize=Math.min(cvs.width,cvs.height)*0.6;
  const ox=(cvs.width-dispSize)/2;
  const oy=(cvs.height-dispSize)/2;
  
  // Read source and draw pixelated
  const src=octx.getImageData(0,0,SRC,SRC);
  const bsize=dispSize/(SRC/ps); // display block size
  
  for(let by=0;by<SRC;by+=ps)for(let bx=0;bx<SRC;bx+=ps){
    // Average color in this block
    let r=0,g=0,b=0,a=0,cnt=0;
    for(let dy=0;dy<ps&&by+dy<SRC;dy++)for(let dx=0;dx<ps&&bx+dx<SRC;dx++){
      const i=((by+dy)*SRC+(bx+dx))*4;
      if(src.data[i+3]>0){r+=src.data[i];g+=src.data[i+1];b+=src.data[i+2];a+=src.data[i+3];cnt++}
    }
    if(cnt>0){
      ctx.fillStyle=`rgba(${Math.floor(r/cnt)},${Math.floor(g/cnt)},${Math.floor(b/cnt)},${(a/cnt)/255})`;
      ctx.fillRect(ox+bx/ps*bsize,oy+by/ps*bsize,Math.ceil(bsize),Math.ceil(bsize));
    }
  }
}

function init(){
  currentFood=FOODS[Math.floor(Math.random()*FOODS.length)];
  answer=currentFood.name;
  row=0;over=false;guesses=[];
  document.getElementById('hint').textContent='\u{1F4A1} 提示：'+currentFood.hints[0];
  document.getElementById('chances-num').textContent=MAX;
  document.getElementById('history').innerHTML='';
  document.getElementById('message').textContent='';
  document.getElementById('end-screen').style.display='none';
  document.getElementById('input-area').style.display='flex';
  document.getElementById('current-row').style.display='flex';
  buildCurrent();
  document.getElementById('text-input').value='';
  // Draw pixel art
  drawPixelArt(currentFood);
  renderPixelated(0);
}

function buildCurrent(){
  const r=document.getElementById('current-row');r.innerHTML='';
  for(let i=0;i<LEN;i++){const t=document.createElement('div');t.className='tile';t.id='t'+i;r.appendChild(t)}
}

function fillCurrent(s){
  const c=[...s];
  for(let i=0;i<LEN;i++){const t=document.getElementById('t'+i);if(i<c.length){t.textContent=c[i];t.className='tile filled'}else{t.textContent='';t.className='tile'}}
}

function evaluate(g,a){
  const r=Array(LEN).fill('absent'),aa=[...a],used=Array(LEN).fill(false),ga=[...g];
  for(let i=0;i<LEN;i++)if(ga[i]===aa[i]){r[i]='correct';used[i]=true}
  for(let i=0;i<LEN;i++){if(r[i]==='correct')continue;for(let j=0;j<LEN;j++)if(!used[j]&&ga[i]===aa[j]){r[i]='present';used[j]=true;break}}
  return r;
}

function addHistory(g,res){
  const h=document.getElementById('history'),d=document.createElement('div');d.className='hist-row';
  const chars=[...g];
  for(let i=0;i<LEN;i++){const t=document.createElement('div');t.className='hist-tile '+res[i];t.textContent=chars[i];d.appendChild(t)}
  h.appendChild(d);
}

function showMsg(t,ms){
  const m=document.getElementById('message');m.textContent=t;
  if(ms>0)setTimeout(()=>{if(m.textContent===t)m.textContent=''},ms);
}

function submit(){
  if(over)return;
  const inp=document.getElementById('text-input'),g=inp.value.trim();
  if([...g].length!==LEN){showMsg('請輸入 3 個字！',2000);return}
  if(!/^[\u4e00-\u9fff]{3}$/.test(g)){showMsg('請輸入中文字！',2000);return}
  const res=evaluate(g,answer);
  guesses.push(g);
  addHistory(g,res);
  row++;
  const won=g===answer;
  document.getElementById('chances-num').textContent=MAX-row;
  
  if(!won&&row<MAX){
    // Update hint
    document.getElementById('hint').textContent='\u{1F4A1} 提示：'+currentFood.hints[Math.min(row,3)];
    // Update pixel art clarity
    renderPixelated(row);
  }
  
  buildCurrent();
  inp.value='';
  
  if(won||row>=MAX){
    over=true;
    document.getElementById('input-area').style.display='none';
    document.getElementById('current-row').style.display='none';
    // Show full clarity on end
    renderPixelated(3);
    const et=document.getElementById('end-title'),ea=document.getElementById('end-answer');
    if(won){const m=['天才！🎉','厲害！👏','不錯喔！😄','好險！😅'];et.textContent=m[row-1]||'答對了！';ea.textContent=''}
    else{et.textContent='沒猜到 😢';ea.textContent='答案是：'+answer}
    document.getElementById('end-screen').style.display='block';
  }else{inp.focus()}
}

function shareResult(){
  const em={correct:'🟩',present:'🟨',absent:'⬛'};
  let t='🍜 猜台灣小吃\n';
  const won=guesses.length>0&&guesses[guesses.length-1]===answer;
  t+=(won?row:'X')+'/'+MAX+'\n\n';
  for(const g of guesses)t+=evaluate(g,answer).map(r=>em[r]).join('')+'\n';
  if(navigator.clipboard)navigator.clipboard.writeText(t).then(()=>showMsg('已複製！📋',2000));
}

// Resize handler
window.addEventListener('resize',()=>{if(currentFood)renderPixelated(Math.min(row,3))});

// Events
document.getElementById('tutorial-btn').onclick=()=>{document.getElementById('tutorial-overlay').style.display='none';document.getElementById('text-input').focus()};
document.getElementById('submit-btn').onclick=submit;
document.getElementById('text-input').addEventListener('input',()=>{if(!over)fillCurrent(document.getElementById('text-input').value.trim())});
document.getElementById('text-input').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();submit()}});
document.getElementById('share-btn').onclick=shareResult;
document.getElementById('replay-btn').onclick=init;

init();
</script>
